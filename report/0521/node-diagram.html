<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>AS-IS / TO-BE</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Malgun Gothic', sans-serif;
    background: #fff;
    color: #333;
    padding: 48px;
  }
  .wrap {
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 60px 1fr;
    gap: 24px;
    align-items: start;
  }
  .panel {
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    padding: 28px;
    background: #fafbfc;
  }
  .title {
    font-size: 14px;
    font-weight: 700;
    color: #888;
    letter-spacing: 2px;
    margin-bottom: 20px;
  }
  .pool {
    background: #fff;
    border-radius: 6px;
    padding: 20px;
    margin-bottom: 14px;
    border: 1px solid #e5e7eb;
  }
  .pool:last-child { margin-bottom: 0; }
  .pool-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .pool-name { font-size: 15px; font-weight: 700; }
  .pool-sub { font-size: 12px; color: #888; }
  .nodes {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
  }
  .node {
    flex: 1;
    height: 36px;
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
  }
  .pool1 .node { background: #fff4e0; color: #d97706; }
  .pool2 .node { background: #e0f2e9; color: #059669; }

  .dots {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 12px;
    background: #f9fafb;
    border-radius: 5px;
    min-height: 50px;
    align-items: center;
  }
  .dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
  }
  .dot.eventu { background: #f59e0b; }
  .dot.ducon { background: #10b981; }

  .legend {
    display: flex;
    gap: 16px;
    font-size: 12px;
    color: #555;
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px dashed #e5e7eb;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .ldot { width: 10px; height: 10px; border-radius: 50%; }
  .ldot.eventu { background: #f59e0b; }
  .ldot.ducon { background: #10b981; }

  .arrow {
    text-align: center;
    font-size: 28px;
    color: #2563eb;
    padding-top: 100px;
  }
  .note {
    font-size: 11px;
    color: #999;
    text-align: center;
    margin-top: 12px;
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="panel">
    <div class="title">AS-IS</div>
    <div class="pool pool1">
      <div class="pool-head">
        <span class="pool-name">userpool1</span>
        <span class="pool-sub">4 nodes · 30 services</span>
      </div>
      <div class="nodes">
        <div class="node">VM1</div>
        <div class="node">VM2</div>
        <div class="node">VM3</div>
        <div class="node">VM4</div>
      </div>
      <div class="dots" id="asis-dots"></div>
      <div class="legend">
        <div class="legend-item"><div class="ldot eventu"></div>이벤트유 22</div>
        <div class="legend-item"><div class="ldot ducon"></div>DU콘 8</div>
      </div>
    </div>
    <div class="note">● 1개 = 서비스 1개</div>
  </div>

  <div class="arrow">→</div>

  <div class="panel">
    <div class="title">TO-BE</div>
    <div class="pool pool1">
      <div class="pool-head">
        <span class="pool-name">userpool1</span>
        <span class="pool-sub">4 nodes · 22 services</span>
      </div>
      <div class="nodes">
        <div class="node">VM1</div>
        <div class="node">VM2</div>
        <div class="node">VM3</div>
        <div class="node">VM4</div>
      </div>
      <div class="dots" id="tobe1-dots"></div>
    </div>
    <div class="pool pool2">
      <div class="pool-head">
        <span class="pool-name">userpool2 <span style="color:#2563eb;font-size:11px;">신규</span></span>
        <span class="pool-sub">3 nodes · 8 services</span>
      </div>
      <div class="nodes">
        <div class="node">VM1</div>
        <div class="node">VM2</div>
        <div class="node">VM3</div>
      </div>
      <div class="dots" id="tobe2-dots"></div>
    </div>
  </div>

</div>

<script>
  function dots(e, d) {
    let html = '';
    for (let i = 0; i < e; i++) html += '<div class="dot eventu"></div>';
    for (let i = 0; i < d; i++) html += '<div class="dot ducon"></div>';
    return html;
  }
  document.getElementById('asis-dots').innerHTML = dots(22, 8);
  document.getElementById('tobe1-dots').innerHTML = dots(22, 0);
  document.getElementById('tobe2-dots').innerHTML = dots(0, 8);
</script>
</body>
</html>
